name: Supply-chain daily scan

# Daily scan of main against the latest threat_intel catalogs from upstream
# perplexityai/bumblebee. If a previously-clean dependency becomes known-bad,
# this is how we find out before someone tries to publish.
#
# DR-005 follow-up: complements the per-PR pre-merge gate in ci.yml.

on:
  schedule:
    # 06:00 UTC daily — off-hours for AU/EU/US publish windows
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    # The daily scan is early-warning against newly-known-bad deps, so it reads the
    # LATEST catalogs — but ONLY the catalogs. The scanner BINARY stays pinned exactly
    # like ci.yml: a floating `bumblebee@main` would execute unpinned upstream code every
    # day inside a job holding GITHUB_TOKEN with `issues: write`, so an upstream
    # compromise = arbitrary code exec with a write token (#850 security). Catalog data
    # is fetched, not executed, so floating BUMBLEBEE_CATALOG_REF=main is bounded to
    # false results (and even those are neutralised before reaching the issue body).
    # New threat entries in the pinned reader's schema are caught; a catalog whose
    # schema_version the reader REJECTS makes the scan fail closed with exit code 2,
    # reported below as a "bump bumblebee" ops alert — never a false compromise finding.
    # LIMIT: an additive change that keeps the schema_version but adds a threat via fields
    # the pinned matcher ignores parses clean and may be silently unmatched (false green);
    # pinning the matcher bounds freshness to its schema — see DR-005.
    env:
      BUMBLEBEE_VERSION: v0.1.2      # pinned scanner binary — never floated (#850)
      BUMBLEBEE_CATALOG_REF: main    # data-only catalog ref — floats for freshness
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - run: npm ci

      - name: Install bumblebee
        # Pinned binary (@${BUMBLEBEE_VERSION} = v0.1.2) — NOT floated. Only the catalog
        # fetch below (BUMBLEBEE_CATALOG_REF=main) tracks HEAD; the executed code is pinned.
        run: go install "github.com/perplexityai/bumblebee/cmd/bumblebee@${BUMBLEBEE_VERSION}"

      - name: Fetch threat catalogs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/fetch-bumblebee-catalogs.sh ./.bumblebee-catalogs

      - name: Run supply-chain scan
        id: scan
        env:
          BUMBLEBEE_CATALOGS: ${{ github.workspace }}/.bumblebee-catalogs
        run: |
          export BUMBLEBEE_BIN="$HOME/go/bin/bumblebee"
          # Capture check-supply-chain.sh's OWN exit code, not tee's. Piping into tee
          # makes `$?` reflect tee (≈always 0), which silently disabled the branches
          # below — the daily scan never filed anything. 0=clean, 1=finding, 2=scan error.
          set +e
          ./scripts/check-supply-chain.sh > scan-output.log 2>&1
          rc=$?
          set -e
          cat scan-output.log
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"

      - name: File issue on findings
        # exit_code 1 = a real compromised-dependency finding (2 = scan error, handled below).
        if: steps.scan.outputs.exit_code == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -e
          # Build issue body in a temp file so untrusted-looking scan output
          # never reaches a shell-evaluation context. gh accepts --body-file.
          BODY_FILE="$(mktemp)"
          {
            printf '%s\n' "Daily supply-chain scan against \`main\` detected one or more bundled dependencies matching the upstream bumblebee threat catalog."
            printf '\n## Scan output\n\n```\n'
            # The scan text embeds finding records whose fields come from upstream catalog
            # data (floated to HEAD) — untrusted. Neutralise markdown control chars before
            # it reaches the issues:write issue body: strip backticks (no code-fence
            # breakout) and @ (no unintended mentions / notification+backlink spam).
            tail -40 scan-output.log | sed 's/`/ /g; s/@/ /g'
            printf '\n```\n\n'
            printf '## What to do\n\n'
            printf '1. Identify the affected package(s) from the finding records below.\n'
            printf '2. Check the upstream advisory in [perplexityai/bumblebee/threat_intel](https://github.com/perplexityai/bumblebee/tree/main/threat_intel).\n'
            printf '3. Pin or remove the dependency, regenerate `package-lock.json`, and re-run the scan locally.\n'
            printf '4. Until resolved, do not run `npm run package` or publish — the pre-package hook will block, but a force-bypass would ship the compromised dep.\n\n'
            printf '## Findings inventory\n\n'
            printf 'Full NDJSON inventory is attached to the workflow run as `supply-chain-inventory` artifact.\n\n'
            printf 'Workflow: %s/%s/actions/runs/%s\n' "$SERVER_URL" "$REPOSITORY" "$RUN_ID"
          } > "$BODY_FILE"

          gh issue create \
            --title "security: supply-chain finding(s) detected in daily scan" \
            --label "security,inbox,P1" \
            --body-file "$BODY_FILE"

      - name: File scan-error alert (scan could not run)
        # exit_code 2 = the scanner errored (e.g. the floated catalog schema advanced past
        # the pinned reader), so the scan could NOT run. This is a "bump bumblebee" ops
        # signal, NOT a compromised-dependency finding — file a low-noise issue (no
        # security/P1 label, no compromise language), so a schema advance never masquerades
        # as a live compromise (#850 / #869).
        if: steps.scan.outputs.exit_code == '2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -e
          BODY_FILE="$(mktemp)"
          {
            printf '%s\n' "The daily supply-chain scan could not run — bumblebee exited with a scan error (not a finding)."
            printf '\n%s\n' "Most likely the upstream threat-intel catalog schema advanced past the pinned reader (the scanner binary is pinned for supply-chain safety; only catalogs float to HEAD). Bump the pinned BUMBLEBEE_VERSION across check-supply-chain.sh, ci.yml and supply-chain-daily.yml together."
            printf '\n## Scanner output\n\n```\n'
            tail -40 scan-output.log | sed 's/`/ /g; s/@/ /g'
            printf '\n```\n\n'
            printf 'Workflow: %s/%s/actions/runs/%s\n' "$SERVER_URL" "$REPOSITORY" "$RUN_ID"
          } > "$BODY_FILE"
          gh issue create \
            --title "ops: daily supply-chain scan could not run (bump bumblebee)" \
            --label "inbox" \
            --body-file "$BODY_FILE"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: supply-chain-inventory
          path: .cache/supply-chain/*.ndjson
          if-no-files-found: warn
          retention-days: 90

      - name: Fail the run on a finding or a scan error
        # Both a real finding (1) and a scan-that-could-not-run (2) are actionable and
        # must red the workflow — an alert issue alone is easy to miss.
        if: steps.scan.outputs.exit_code != '0'
        run: exit 1
