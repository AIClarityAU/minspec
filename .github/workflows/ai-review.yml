# ai-review — independent AI reviewer in CI, posting AS THE APP (#342 Track B, #428)
#
# Runs the credential-free independent reviewer over a PR's diff and posts the
# verdict + applies the `ai-review:pass` / `ai-review:changes` label AS THE
# `minspec-sdd[bot]` GitHub App — giving the label bot-PROVENANCE, the root that
# makes auto-merge-on-`ai-review:pass` safe (#428). This is the "dedicated
# reviewer identity" the ready-to-merge.yml header calls out as the missing piece:
# until now the label was applied by a human account, so its provenance could only
# be enforced at account granularity. Applied by the App from THIS run only (no
# human in the loop), it becomes a real provenance root.
#
# ── REUSED, NOT REWRITTEN (on main) ──────────────────────────────────────────
#   • scripts/review-branch.sh <base> <head> [--role reviewer|security]
#       Runs `claude -p --allowedTools "Read,Glob,Grep" --model opus` over
#       `git diff base...head` framed as <untrusted_diff>; prints the raw agent
#       output (a REVIEW_VERDICT_BEGIN…END block) to stdout. The agent holds NO
#       gh/git/network/Bash — it can only return TEXT. Empty diff / agent crash →
#       no verdict (the gate then fails closed).
#   • scripts/review-decide.sh  (stdin→stdout, pure, fail-closed)
#       Emits exactly one label: `ai-review:pass` or `ai-review:changes`. Missing/
#       garbled/>1-block/non-"pass"/ESCALATE → `ai-review:changes` (never a false
#       green).
#
# ── SECURITY MODEL (T0 invariants) ───────────────────────────────────────────
#   • TRUSTED CONTROL PLANE FROM BASE (the load-bearing one). We check out the
#     PR's BASE ref, so every executed script — scripts/review-branch.sh,
#     scripts/review-decide.sh, scripts/roles/* — is the BASE (trusted) version.
#     A same-repo PR author (write access → secrets present) therefore CANNOT
#     rewrite review-decide.sh to `echo ai-review:pass` and forge the bot-applied
#     pass that #428/auto-merge trusts. The untrusted head is fetched for the
#     `git diff base...head` ONLY — its file CONTENTS are seen solely as diff DATA,
#     never checked out into the workspace and never executed.
#   • `pull_request` (NOT `pull_request_target`): the latter would run untrusted
#     PR code WITH secrets — a well-known exfil hole. Our PRs are same-repo
#     branches, so secrets are available under plain `pull_request`. A FORK PR
#     gets EMPTY secrets → the guard step below skips cleanly (no red, no leak).
#   • Credential separation. The review agent (`claude -p` inside
#     review-branch.sh) authenticates for INFERENCE via CLAUDE_CODE_OAUTH_TOKEN,
#     but runs with `--allowedTools "Read,Glob,Grep"` so it has NO tool that can
#     use a credential (no gh, git, network, or Bash). The GitHub App token lives
#     ONLY in the stale-clear / post / fail-closed steps (the credentialed parent)
#     and is NEVER present in the review step — so the agent cannot post, label, or
#     merge. The untrusted diff stays DATA (review-branch.sh does the framing);
#     this workflow never interpolates PR title/body/diff into a shell (only
#     base/head SHAs and the PR number, passed via env).
#   • Output redaction (token exfil). The review step carries
#     CLAUDE_CODE_OAUTH_TOKEN for inference; a prompt-injected diff could coax the
#     no-tools reviewer to echo `/proc/self/environ`. Before the verdict text ever
#     reaches the PR comment we scrub the token value AND any `sk-ant-*` secret to
#     `***`, so a leaked token can never land in the bot-posted comment. (The App
#     token is not in this step at all.)
#   • Supply chain. The Claude CLI is pinned to an exact published version and
#     every marketplace action to a full commit SHA — a backdoored `latest`/`@vN`
#     cannot run with the token in env.
#   • TOCTOU. `cancel-in-progress` can leave a superseded `ai-review:pass` (from an
#     earlier commit) on the PR while this run re-reviews the new head. At run
#     start we clear any stale pass and mark the PR `ai-review:pending`, so it
#     cannot feed auto-merge mid-run. The COMPLETE fix — ready-to-merge verifying
#     the pass was applied to the CURRENT head SHA — is a follow-up in
#     ready-to-merge.yml (deliberately NOT edited from here).
#   • Fail closed everywhere: any error, missing verdict, or a `packages/`
#     security-role that requests changes → `ai-review:changes`. A spurious `pass`
#     is the worst outcome (it feeds auto-merge), so `pass` is emitted ONLY on an
#     unambiguous clean verdict from every required role.
#
# ── ACTIVATION (deps flagged in the PR body) ─────────────────────────────────
#   1. Add the `CLAUDE_CODE_OAUTH_TOKEN` repo secret (`claude setup-token`) — a
#      genuine-CLI subscription OAuth token, per DR-052 (NOT the Agent SDK, NOT a
#      broker). Until it exists, this workflow SKIPS with a notice (never reds).
#   2. Confirm `MINSPEC_APP_PRIVATE_KEY` is the RAW PEM (create-github-app-token
#      needs raw, not base64), and the App is installed on the repo with
#      `pull-requests: write` + `issues: write` (labels/comments use the issues API).
#   3. AFTER a verified run: set repo variable `AI_REVIEW_LABEL_ACTORS =
#      minspec-sdd[bot]` (so ready-to-merge.yml trusts ONLY the bot) and make a
#      check required in branch protection. Both are deliberately NOT done here.

name: ai-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Least privilege for the workflow's OWN token: it only needs to read code to
# check out. All PR posting/labelling uses the App token (steps.app-token), never
# this GITHUB_TOKEN — that is what gives the label its bot provenance.
permissions:
  contents: read

# One review in flight per PR; a new push supersedes the previous run.
concurrency:
  group: ai-review-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      # Secrets can't be read inside `if:`, so copy them into a step env and set an
      # output. Empty (unset secret, or a fork PR) → skip the rest with a NOTICE,
      # never a failure. Keeps this workflow safe to merge before the credentials
      # exist and safe against fork PRs.
      - name: Check reviewer is configured (skip cleanly if not)
        id: guard
        env:
          OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          APP_ID: ${{ secrets.MINSPEC_APP_ID }}
          APP_KEY: ${{ secrets.MINSPEC_APP_PRIVATE_KEY }}
        run: |
          set -eu
          if [ -z "${OAUTH_TOKEN}" ] || [ -z "${APP_ID}" ] || [ -z "${APP_KEY}" ]; then
            echo "::notice title=AI reviewer not configured::Add the CLAUDE_CODE_OAUTH_TOKEN and MINSPEC_APP_ID / MINSPEC_APP_PRIVATE_KEY repo secrets to activate the independent AI reviewer. Skipping — this is NOT a failure."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      # Mint the App installation token → the actor for every post/label below is
      # `minspec-sdd[bot]`. Needs the RAW PEM in MINSPEC_APP_PRIVATE_KEY.
      - name: Mint GitHub App token (post as minspec-sdd[bot])
        id: app-token
        if: steps.guard.outputs.configured == 'true'
        uses: actions/create-github-app-token@f2acddfb5195534d487896a656232b016a682f3c # v1.9.0
        with:
          app-id: ${{ secrets.MINSPEC_APP_ID }}
          private-key: ${{ secrets.MINSPEC_APP_PRIVATE_KEY }}

      # TOCTOU guard (partial). `cancel-in-progress` means a superseded
      # `ai-review:pass` from an earlier commit can linger while this run re-reviews
      # the NEW head — long enough for auto-merge to fire on unreviewed code. Clear
      # any stale pass and mark the PR `ai-review:pending` for the duration of this
      # run, AS THE BOT (App token). Best-effort (`|| true`): removing the stale
      # pass is load-bearing, but a transient label-API hiccup here must not red the
      # run — the final post step below writes the authoritative label anyway. The
      # COMPLETE fix (ready-to-merge verifying the pass label's commit SHA == head)
      # is a follow-up in ready-to-merge.yml, NOT edited here.
      - name: Clear stale pass at run start (mark pending) as minspec-sdd[bot]
        if: steps.guard.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "ai-review:pass" 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "ai-review:pending" 2>/dev/null || true

      # Check out the TRUSTED BASE ref (NOT the PR head). This makes the executed
      # control plane — scripts/review-branch.sh, scripts/review-decide.sh,
      # scripts/roles/* — the BASE versions, so a same-repo PR cannot rewrite the
      # gate to forge a pass. fetch-depth: 0 gives full history (so the merge-base
      # for `base...head` is present); the untrusted head is fetched in the review
      # step for the DIFF ONLY (data), never checked out or executed.
      - name: Checkout TRUSTED base (control scripts come from base, never head)
        if: steps.guard.outputs.configured == 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Set up Node 22
        if: steps.guard.outputs.configured == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      # Genuine Claude Code CLI so `claude -p` (inside review-branch.sh) is on PATH.
      # DR-052: the real CLI direct to Anthropic — NOT the Agent SDK, NOT a broker.
      # Pinned to an exact published version (supply-chain): a backdoored `latest`
      # must not run in the step that holds the inference token.
      - name: Install Claude Code CLI
        if: steps.guard.outputs.configured == 'true'
        run: npm install -g @anthropic-ai/claude-code@2.1.201

      # Reviewer (always) + security (only if packages/ touched). Each role's
      # output is decided by the fail-closed gate; the combined verdict passes ONLY
      # if every required role passed. CLAUDE_CODE_OAUTH_TOKEN is the INFERENCE
      # credential for `claude -p` here — the agent still has no actionable tool.
      # The App token is intentionally ABSENT from this step.
      - name: Independent review → decide combined label
        id: review
        if: steps.guard.outputs.configured == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail

          BASE="$PR_BASE_SHA"
          HEAD="$PR_HEAD_SHA"

          # The workspace is the TRUSTED base checkout (fetch-depth: 0). Fetch the
          # UNTRUSTED head SHA so `git diff base...head` has both endpoints — the
          # head is brought in as DIFF DATA ONLY; it is never checked out and no
          # script from it is executed. The SHA is passed via env (never raw
          # interpolation). If the fetch fails, the diff is empty → fail closed.
          git fetch --no-tags --quiet origin "$HEAD" 2>/dev/null || true

          extract_block() { sed -n '/REVIEW_VERDICT_BEGIN/,/REVIEW_VERDICT_END/p'; }

          # Scrub any inference-token value or `sk-ant-*` secret to `***` before the
          # reviewer text can reach the PR comment. Defeats a prompt-injected diff
          # that coaxes the no-tools reviewer into echoing /proc/self/environ.
          # awk index() does a LITERAL (regex-free) match of the exact token value,
          # so it is robust regardless of characters in the token.
          redact() {
            sed -E 's/sk-ant-[A-Za-z0-9_-]+/***/g' \
              | if [ -n "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
                  awk -v tok="$CLAUDE_CODE_OAUTH_TOKEN" \
                    '{ while ((p=index($0,tok))>0) $0=substr($0,1,p-1) "***" substr($0,p+length(tok)); print }'
                else
                  cat
                fi
          }

          # ── reviewer role (always) ──
          REVIEWER_OUT="$(bash scripts/review-branch.sh "$BASE" "$HEAD" --role reviewer || true)"
          REVIEWER_LABEL="$(printf '%s\n' "$REVIEWER_OUT" | bash scripts/review-decide.sh || true)"
          REVIEWER_BLOCK="$(printf '%s\n' "$REVIEWER_OUT" | extract_block | redact)"
          [ -z "$REVIEWER_BLOCK" ] && REVIEWER_BLOCK="(reviewer emitted no verdict block — fail-closed to changes)"

          # ── security role (only if packages/ changed) ──
          CHANGED="$(git diff --name-only "$BASE...$HEAD" 2>/dev/null || true)"
          SECURITY_REQUIRED=no
          SECURITY_LABEL=""
          SECURITY_BLOCK=""
          if printf '%s\n' "$CHANGED" | grep -qE '^packages/'; then
            SECURITY_REQUIRED=yes
            SECURITY_OUT="$(bash scripts/review-branch.sh "$BASE" "$HEAD" --role security || true)"
            SECURITY_LABEL="$(printf '%s\n' "$SECURITY_OUT" | bash scripts/review-decide.sh || true)"
            SECURITY_BLOCK="$(printf '%s\n' "$SECURITY_OUT" | extract_block | redact)"
            [ -z "$SECURITY_BLOCK" ] && SECURITY_BLOCK="(security reviewer emitted no verdict block — fail-closed to changes)"
          fi

          # ── combine: pass ONLY if every required role passed (any non-pass → changes) ──
          FINAL="ai-review:changes"
          if [ "$REVIEWER_LABEL" = "ai-review:pass" ]; then
            if [ "$SECURITY_REQUIRED" = "yes" ]; then
              [ "$SECURITY_LABEL" = "ai-review:pass" ] && FINAL="ai-review:pass"
            else
              FINAL="ai-review:pass"
            fi
          fi

          echo "label=$FINAL" >> "$GITHUB_OUTPUT"
          echo "Reviewer=${REVIEWER_LABEL:-<none>} | Security(${SECURITY_REQUIRED})=${SECURITY_LABEL:-<n/a>} | FINAL=$FINAL"

          # ── build the PR comment body (findings/rationale behind the label) ──
          BODY="$RUNNER_TEMP/ai-review-comment.md"
          {
            echo "## 🤖 AI review — \`$FINAL\`"
            echo
            echo "### Reviewer"
            echo '```'
            printf '%s\n' "$REVIEWER_BLOCK"
            echo '```'
            if [ "$SECURITY_REQUIRED" = "yes" ]; then
              echo
              echo "### Security (\`packages/\` changed)"
              echo '```'
              printf '%s\n' "$SECURITY_BLOCK"
              echo '```'
            fi
            echo
            echo "_Independent fresh-context reviewer (\`scripts/review-branch.sh\`, no-tools agent reading the diff as untrusted data); label decided by the deterministic fail-closed gate (\`scripts/review-decide.sh\`). Posted by \`minspec-sdd[bot]\` from CI — provenance is the App identity, verified here, not the label alone (#428, #342). A combined verdict fails toward \`changes\` if any role requests changes._"
          } > "$BODY"
          echo "body-file=$BODY" >> "$GITHUB_OUTPUT"

      # Post + label AS THE BOT. GH_TOKEN = App token (this is the ONLY step, with
      # the fail-closed one, that holds it). No CLAUDE_CODE_OAUTH_TOKEN here.
      - name: Post verdict + apply label as minspec-sdd[bot]
        if: steps.guard.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LABEL: ${{ steps.review.outputs.label }}
          BODY_FILE: ${{ steps.review.outputs.body-file }}
        run: |
          set -euo pipefail

          # Normalise fail-closed: anything other than an exact `ai-review:pass`
          # becomes `ai-review:changes`.
          if [ "$LABEL" = "ai-review:pass" ]; then
            OPPOSITE="ai-review:changes"
          else
            LABEL="ai-review:changes"
            OPPOSITE="ai-review:pass"
          fi

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file "$BODY_FILE"

          # Apply the decided label FIRST (load-bearing), then clear the opposite +
          # the in-progress marker (tolerate their absence).
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "$LABEL"
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "$OPPOSITE" 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "ai-review:pending" 2>/dev/null || true

      # Backstop: if ANY step above errored (install, mint, review, post…), request
      # changes as the bot so an error never yields a green. If the token mint
      # itself failed there is no bot identity to post as — fail red (still no
      # spurious pass), which is the safe outcome.
      - name: Fail closed — request changes as minspec-sdd[bot] on any error
        if: failure() && steps.guard.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -uo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::App token unavailable (mint failed) — cannot post as the bot. Failing red; no spurious pass."
            exit 1
          fi
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$(printf '## 🤖 AI review — `ai-review:changes` (fail-closed)\n\nThe AI review workflow errored before producing a clean verdict, so it is requesting changes. This is a fail-closed default — an error must never yield a green. See the [workflow run](%s).\n\n_Posted by minspec-sdd[bot]._' "$RUN_URL")"
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "ai-review:changes"
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "ai-review:pass" 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "ai-review:pending" 2>/dev/null || true
          # Re-fail so the job status honestly reflects the error (label recovered).
          exit 1
