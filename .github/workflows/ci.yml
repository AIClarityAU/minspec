name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate frontmatter
        run: npm run validate

      # Pure decision logic behind the ai-review label-integrity gate
      # (.github/workflows/ready-to-merge.yml). Lives under .github/scripts so it
      # is outside vitest's packages/* include; run it directly on Node so the
      # security-critical revert/strip/green decisions stay enforced in CI.
      - name: Unit-test ai-review label guard
        run: node --test .github/scripts/ai-review-guard.test.js

  # Workflow-syntax + expression lint (#486 harden). CI validated YAML syntax but
  # NOT the GitHub Actions schema/expression grammar, so an invalid `${{ }}` reached
  # main and put ai-review into startup_failure REPO-WIDE (a literal empty `${{ }}`
  # in a run: comment — YAML sees a string, Actions sees an invalid expression). This
  # is the gate that was missing. shellcheck/pyflakes are OFF: they lint the shell/
  # python INSIDE run: blocks (noisy style, out of scope) — we gate ONLY the
  # workflow-syntax/expression/schema class that broke the pipeline. Verified clean
  # across all current workflows with these flags; still catches the #486 class.
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Pinned script + pinned binary version (the exact release used to verify the
      # #486 fix) — deterministic, no floating `latest`/`main`.
      - name: Install actionlint (pinned)
        run: bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12

      - name: Lint GitHub Actions workflows
        run: ./actionlint -shellcheck= -pyflakes= -color

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # @aiclarity/shared is consumed by extension source (e.g. bridge.ts). The v8
      # coverage provider resolves that cross-package import to the package's built
      # `out/` entry when instrumenting — the test-only vitest `resolve.alias`
      # (which redirects to source) does not cover the coverage provider's own
      # resolution, so without a build the run fails with "Cannot find module
      # @aiclarity/shared/out/index.js". Build the Tier-0 lib first (pure tsc).
      - name: Build shared lib (coverage resolution)
        run: npm run build --workspace=@aiclarity/shared

      # @vitest/coverage-v8 is a devDependency pinned to the vitest version in
      # package.json (^4.1.7); `npm ci` installs the matching provider. A prior
      # step force-installed coverage-v8@2.1.9 with --legacy-peer-deps on top of
      # vitest@4 — that incompatible provider reaches into vitest internals that
      # moved in v4, throwing `Cannot read properties of undefined (reading
      # 'fetchCache')` during the coverage run (#158). Keep the provider version
      # sourced solely from package.json so a vitest bump can't desync it again.
      - name: Test with coverage
        run: npx vitest run --coverage --coverage.reporter=json-summary --coverage.reporter=text

      - name: Generate badge JSON
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          node -e "
            const fs = require('fs');
            const summary = require('./coverage/coverage-summary.json');
            const cov = Math.round(summary.total.statements.pct * 10) / 10;
            const covColor = cov >= 90 ? 'brightgreen' : cov >= 80 ? 'green' : cov >= 70 ? 'yellow' : 'red';
            fs.mkdirSync('.badges', { recursive: true });
            fs.writeFileSync('.badges/coverage.json', JSON.stringify({
              schemaVersion: 1, label: 'coverage', message: cov + '%', color: covColor
            }));
          "

      - name: Extract test counts
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          TEST_OUTPUT=$(npx vitest run 2>&1 || true)
          PASSED=$(echo "$TEST_OUTPUT" | grep -oP '\d+(?= passed)' | tail -1)
          TOTAL=$(echo "$TEST_OUTPUT" | grep -oP '(?<=\()\d+(?=\))' | tail -1)
          if [ "$PASSED" = "$TOTAL" ]; then COLOR="brightgreen"; else COLOR="red"; fi
          echo "{\"schemaVersion\":1,\"label\":\"tests\",\"message\":\"${PASSED} passed\",\"color\":\"${COLOR}\"}" > .badges/tests.json

      - name: Publish badges to badges branch
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: badges
          folder: .badges
          clean: false

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build MinSpec
        working-directory: packages/minspec
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build extension
        working-directory: packages/minspec
        run: npm run build

      - name: Compile e2e tests
        working-directory: packages/minspec
        run: tsc -p tsconfig.test.json

      - name: Run e2e tests
        working-directory: packages/minspec
        run: xvfb-run -a npm run test:e2e

  security:
    name: Supply-chain scan (bumblebee)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - run: npm ci

      - name: Install bumblebee
        run: go install github.com/perplexityai/bumblebee/cmd/bumblebee@v0.1.2

      - name: Fetch threat catalogs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/fetch-bumblebee-catalogs.sh ./.bumblebee-catalogs

      - name: Run supply-chain scan
        env:
          BUMBLEBEE_BIN: ${{ runner.tool_cache }}/go/bin/bumblebee
          BUMBLEBEE_CATALOGS: ${{ github.workspace }}/.bumblebee-catalogs
        run: |
          # Use Go's GOBIN default ($HOME/go/bin) since setup-go does not set tool_cache path.
          export BUMBLEBEE_BIN="$HOME/go/bin/bumblebee"
          ./scripts/check-supply-chain.sh

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: supply-chain-inventory
          path: .cache/supply-chain/*.ndjson
          if-no-files-found: warn
          retention-days: 30

  package:
    runs-on: ubuntu-latest
    needs: [build, security]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build MinSpec
        working-directory: packages/minspec
        run: npm run build

      - name: Package MinSpec
        working-directory: packages/minspec
        run: npx vsce package --no-dependencies

      - uses: actions/upload-artifact@v4
        with:
          name: minspec-vsix
          path: packages/minspec/*.vsix
          if-no-files-found: error
